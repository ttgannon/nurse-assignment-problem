name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build & type-check ────────────────────────────────────────────────────
  ci:
    name: Build & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: Install frontend deps
        run: npm ci

      # Vite build validates TypeScript for all files actually in the bundle.
      # Legacy React-Bootstrap files exist on disk but are not imported, so they
      # don't block this step.
      - name: Build frontend
        run: npm run build
        env:
          # These are placeholders for the CI build; real values live in the
          # Vercel project dashboard and are injected at deploy time.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://nursify-api.fly.dev' }}
          VITE_FHIR_REDIRECT_URI: ${{ vars.VITE_FHIR_REDIRECT_URI || 'https://nursify.vercel.app/auth/callback' }}

      # ── Backend ───────────────────────────────────────────────────────────────
      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: server

  # ── 2. Deploy backend → Fly.io ───────────────────────────────────────────────
  # Triggered only on pushes to main (not PRs).
  # Fly.io performs a rolling deploy:
  #   a) Builds the new Docker image on Fly's remote builders
  #   b) Runs `release_command` (prisma db push) in the new container
  #   c) If that passes, starts a new VM and health-checks /health
  #   d) Only then stops the old VM → zero downtime
  deploy-backend:
    name: Deploy backend (Fly.io)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── 3. Deploy frontend → Vercel ──────────────────────────────────────────────
  # Vercel performs an atomic swap — the old version serves until the new
  # deployment passes all checks, then DNS is pointed at the new build.
  deploy-frontend:
    name: Deploy frontend (Vercel)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
