name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Build & type-check ────────────────────────────────────────────────────
  ci:
    name: Build & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: Install frontend deps
        run: npm ci

      # Vite build validates TypeScript for all files in the bundle.
      # Legacy React-Bootstrap files exist on disk but are not imported,
      # so they don't affect this step.
      - name: Build frontend
        run: npm run build
        env:
          # CI placeholders — real values are set in the Vercel dashboard
          # and injected at Vercel build time, not here.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://nursify-api.onrender.com' }}
          VITE_FHIR_REDIRECT_URI: ${{ vars.VITE_FHIR_REDIRECT_URI || 'https://nursify.vercel.app/auth/callback' }}

      # ── Backend ───────────────────────────────────────────────────────────────
      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: server

  # ── 2. Deploy backend → Render ───────────────────────────────────────────────
  # Only runs on pushes to main (not PRs).
  #
  # How Render zero-downtime works:
  #   a) Render receives the deploy hook → pulls latest main
  #   b) Runs buildCommand (npm ci + prisma generate + tsc)
  #   c) Starts the new instance and waits for /health to return 200
  #   d) Only then switches traffic to the new instance and stops the old one
  #
  # The deploy hook is fire-and-forget from GitHub's perspective, but
  # Render handles the health-check gate server-side.
  deploy-backend:
    name: Deploy backend (Render)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Deploy hook failed" && exit 1
          fi

  # ── 3. Deploy frontend → Vercel ──────────────────────────────────────────────
  # Vercel performs an atomic swap — the old deployment keeps serving until
  # the new build passes, then the CDN alias is updated instantly.
  deploy-frontend:
    name: Deploy frontend (Vercel)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
