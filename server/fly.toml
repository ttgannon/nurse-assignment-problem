# Fly.io application configuration
# Docs: https://fly.io/docs/reference/configuration/
#
# SETUP: run `fly apps create nursify-api` (or choose a unique name)
# and update the `app` field below to match.

app = "nursify-api"
primary_region = "iad"   # US East (cheapest egress for most users)

[build]
  dockerfile = "Dockerfile"

# ── Release command ───────────────────────────────────────────────────────────
# Runs in the NEW container BEFORE traffic is switched.
# If it fails, the deploy is aborted and the old version keeps serving
# (this is what gives us zero-downtime + safe schema migrations).
[deploy]
  strategy = "rolling"
  release_command = "npm run db:push:prod"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"   # scales to zero when idle → free tier friendly
  auto_start_machines = true
  min_machines_running = 0      # set to 1 (~$2/mo) for always-on, no cold starts

  # Health check — Fly.io waits for this to pass before routing traffic
  [[http_service.checks]]
    interval = "15s"
    timeout  = "5s"
    grace_period = "20s"
    method   = "GET"
    path     = "/health"

# ── VM sizing ─────────────────────────────────────────────────────────────────
[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
